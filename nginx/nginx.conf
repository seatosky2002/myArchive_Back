server {
    listen 80;
    server_name _;

    # Docker 내부 DNS — upstream IP 변경 시 재조회
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 20M;

    # Django 정적 파일 (collectstatic 결과)
    location /static/ {
        alias /app/staticfiles/;
    }

    # 업로드 이미지
    location /media/ {
        alias /app/media/;
    }

    # API 요청 → Gunicorn
    location /api/ {
        set $upstream http://api:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React SPA — 나머지 모든 요청
    location / {
        root  /app/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA 라우팅 (새로고침 404 방지)
    }
}
