version: '3.9'

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────
  # 프로덕션(EC2+RDS)에서는 이 서비스를 제거하고 .env의 DB_HOST를 RDS 엔드포인트로 변경
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Django API 서버 ───────────────────────────────────────────────────
  api:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    expose:
      - "8000"

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A config worker --concurrency=2 --loglevel=warning
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Nginx (리버스 프록시) ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  static_files:
